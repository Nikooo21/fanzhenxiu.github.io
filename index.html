<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樊珍秀 | 商务数据分析学习平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #2d3748;
            line-height: 1.6;
        }

        /* 首页样式 */
        .home-header {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            text-align: center;
            padding: 60px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .home-header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .home-header p {
            font-size: 18px;
            opacity: 0.95;
        }

        .home-container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            font-size: 26px;
            color: #1e3a8a;
            margin-bottom: 40px;
            position: relative;
        }

        .section-title::after {
            content: '';
            width: 60px;
            height: 3px;
            background: #3b82f6;
            display: block;
            margin: 12px auto;
            border-radius: 2px;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .course-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(17,24,39,0.06);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: #2d3748;
        }

        .course-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(59, 130, 246, 0.15);
        }

        .course-card h3 {
            font-size: 20px;
            color: #1e3a8a;
            margin-bottom: 12px;
        }

        .course-card p {
            font-size: 15px;
            color: #64748b;
        }

        /* 学习页布局 */
        .learning-page {
            display: none;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #fff;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: #fff;
            font-weight: bold;
            font-size: 18px;
        }

        .course-item {
            padding: 12px 16px;
            margin: 8px;
            border-radius: 8px;
            cursor: pointer;
        }

        .course-item.active {
            background: #e0eaff;
            color: #1e3a8a;
        }

        .chapter-item {
            padding: 8px 16px 8px 28px;
            font-size: 14px;
            color: #555;
            cursor: pointer;
            border-radius: 6px;
            margin: 4px 10px;
        }

        .chapter-item.active {
            background: #d0e8ff;
            color: #1e3a8a;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border-radius: 8px;
            text-decoration: none;
        }

        .content-block {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
        }

        .code-editor {
            background: #1e293b;
            color: #f1f5f9;
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
            position: relative;
        }

        .code-editor textarea {
            width: 100%;
            min-height: 120px;
            background: transparent;
            color: inherit;
            border: none;
            outline: none;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .run-btn, .copy-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .run-btn {
            background: #10b981;
            color: white;
        }

        .copy-btn {
            background: #475569;
            color: white;
        }

        .output-area {
            background: #0f172a;
            color: #22c55e;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-family: monospace;
        }

        .exercise-block {
            background: #fef3c7;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- 首页 -->

        <div class="home-header">
            <h1>樊珍秀</h1>

                </div>
                <div class="course-card" onclick="openCourse('供应链数据分析')">
                    <h3>供应链数据分析</h3>
                    <p>共10个章节 | 在线运行 + 课后练习</p>
                </div>
                <div class="course-card" onclick="openCourse('数据库原理与应用')">
                    <h3>数据库原理与应用</h3>
                    <p>共10个章节 | 在线运行 + 课后练习</p>
                </div>
            </div>
        </div>

        <div class="footer">
            © 2026 樊珍秀 | 商务数据分析与应用专业学习平台
        </div>
    </div>

    <!-- 学习页 -->
    <div class="learning-page" id="learningPage">
        <div class="sidebar">
            <div class="sidebar-header">樊珍秀 · 学习平台</div>
            <div id="courseList"></div>
        </div>

        <div class="main-content">
            <a href="#" class="back-btn" onclick="goHome()">← 返回首页</a>
            <div id="chapterContent"></div>
        </div>
    </div>

        let currentCourse = '';
        let currentChapter = 0;

        // 打开学习页
        function openCourse(courseName) {
            currentCourse = courseName;
            currentChapter = 0;
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('learningPage').style.display = 'flex';
            renderSidebar();
            renderChapterContent();
        }

        // 返回首页
        function goHome() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('learningPage').style.display = 'none';
        }

        // 渲染侧边栏
        function renderSidebar() {
            const courseList = document.getElementById('courseList');
            courseList.innerHTML = '';

            // 课程列表
            Object.keys(coursesData).forEach(course => {
                const courseItem = document.createElement('div');
                courseItem.className = 'course-item' + (course === currentCourse ? ' active' : '');
                courseItem.textContent = course;
                courseItem.onclick = () => {
                    currentCourse = course;
                    currentChapter = 0;
                    renderSidebar();
                    renderChapterContent();
                };
                courseList.appendChild(courseItem);

                // 章节列表
                if (course === currentCourse) {
                    coursesData[course].forEach((chapter, index) => {
                        const chapterItem = document.createElement('div');
                        chapterItem.className = 'chapter-item' + (index === currentChapter ? ' active' : '');
                        chapterItem.textContent = chapter.title;
                        chapterItem.onclick = () => {
                            currentChapter = index;
                            renderChapterContent();
                            renderSidebar();
                        };
                        courseList.appendChild(chapterItem);
                    });
                }
            });
        }

        // 渲染章节内容
        function renderChapterContent() {
            const chapter = coursesData[currentCourse][currentChapter];
            const contentDiv = document.getElementById('chapterContent');
            
            contentDiv.innerHTML = `
                <div class="content-block">
                    <h2>${chapter.title}</h2>
                    <p style="margin-top:15px;line-height:1.8;">${chapter.content}</p>
                </div>

                <div class="content-block">
                    <h3>示例代码</h3>
                    <div class="code-editor">
                        <textarea id="codeEditor">${chapter.code}</textarea>
                        <div class="btn-group">
                            <button class="run-btn" onclick="runCode()">运行代码</button>
                            <button class="copy-btn" onclick="copyCode()">复制代码</button>
                        </div>
                        <div class="output-area" id="outputArea">// 运行结果将显示在这里</div>
                    </div>
                </div>

                <div class="exercise-block">
                    <h3>📝 课后练习</h3>
                    <p style="margin-top:10px;">${chapter.exercise}</p>
                </div>
            `;
        }

        // 运行代码（使用Pyodide模拟Python环境）
        async function runCode() {
            const code = document.getElementById('codeEditor').value;
            const outputArea = document.getElementById('outputArea');
            
            try {
                // 简单的Python代码执行（使用eval，适合简单示例）
                // 注意：仅支持print、变量定义等简单语句
                const lines = code.split('\n');
                let jsCode = '';
                for (let line of lines) {
                    line = line.trim();
                    if (line.startsWith('print(')) {
                        // 处理print语句
                        const printContent = line.slice(6, -1);
                        jsCode += `console.log(${printContent});\n`;
                    } else if (line.includes('=')) {
                        // 处理变量赋值
                        jsCode += line + '\n';
                    } else if (line.startsWith('#')) {
                        // 注释
                        continue;
                    } else if (line) {
                        jsCode += line + '\n';
                    }
                }
                
                // 捕获console.log输出
                const logs = [];
                const originalLog = console.log;
                console.log = (...args) => logs.push(args.join(' '));
                
                eval(jsCode);
                
                console.log = originalLog;
                outputArea.textContent = logs.join('\n') || '代码运行成功，无输出';
            } catch (e) {
                outputArea.textContent = '错误：' + e.message;
            }
        }

        // 复制代码
        function copyCode() {
            const code = document.getElementById('codeEditor').value;
            navigator.clipboard.writeText(code).then(() => {
                alert('代码已复制到剪贴板！');
            });
        }
    </script>
