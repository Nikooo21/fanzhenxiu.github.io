<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樊珍秀 - 个人课程学习平台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family: "Microsoft YaHei",sans-serif}
        body{background:#f5f7fa;display:flex;height:100vh}
        .left{width:280px;background:#fff;box-shadow:2px 0 10px #0001;overflow-y:auto}
        .logo{padding:24px;background:linear-gradient(135deg,#1e3a8a,#3b82f6);color:#fff;font-weight:bold;font-size:18px}
        .course{padding:12px 16px;margin:8px;border-radius:8px;cursor:pointer}
        .course.active{background:#e0eaff;color:#1e3a8a}
        .chap{padding:8px 16px 8px 28px;font-size:14px;color:#555;cursor:pointer}
        .chap.active{background:#d0e8ff;color:#1e3a8a}
        .right{flex:1;padding:30px;overflow-y:auto}
        .title{font-size:24px;color:#1e3a8a;margin-bottom:20px}
        .desc{background:#fff;padding:20px;border-radius:12px;margin-bottom:15px;line-height:1.8}
        .code{background:#1e293b;color:#f1f5f9;padding:20px;border-radius:10px;position:relative;margin:15px 0;font-family:monospace}
        .copy{position:absolute;right:12px;top:10px;background:#475569;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer}
        .exercise{background:#fff7e6;padding:20px;border-radius:12px;margin-top:15px}
        .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:20px}
        .card{background:#fff;padding:24px;border-radius:16px;cursor:pointer;box-shadow:0 4px 12px #0001}
        .card:hover{transform:translateY(-4px)}
        .card h3{color:#1e3a8a;margin-bottom:10px}
        .hide{display:none}
    </style>
</head>
<body>

<div class="left" id="sidebar" style="display:none">
    <div class="logo">樊珍秀 · 学习平台</div>
    <div id="courseList"></div>
</div>

<div class="right" id="content">
    <div style="text-align:center;margin-bottom:30px">
        <h1 style="color:#1e3a8a">樊珍秀</h1>
        <p style="color:#666;margin-top:8px">广东科学技术职业学院 | 商务数据分析与应用专业</p>
    </div>
    <div class="grid" id="courseCards"></div>
</div>

<script>
const data = {
  "Python基础": [
    {title:"Python入门与输出",code:'print("Hello")',ex:"输出姓名"},
    {title:"变量与类型",code:'name="樊珍秀"',ex:"定义年龄变量"},
    {title:"数字运算",code:'print(1+2)',ex:"计算长方形面积"},
    {title:"字符串",code:'s="数据"',ex:"截取字符串"},
    {title:"条件判断",code:'if a>10:',ex:"判断成绩及格"},
    {title:"for循环",code:'for i in range(5)',ex:"循环1-10"},
    {title:"while循环",code:'while i<5',ex:"求和1-100"},
    {title:"列表",code:'a=[1,2,3]',ex:"遍历列表"},
    {title:"函数",code:'def f():',ex:"写加法函数"},
    {title:"综合项目",code:'input()',ex:"个人信息录入"}
  ],
  "数据分析技术": [
    {title:"NumPy基础",code:"import numpy",ex:"创建数组"},
    {title:"Pandas入门",code:"import pandas",ex:"读取数据"},
    {title:"数据清洗",code:"df.dropna()",ex:"删除空值"},
    {title:"数据筛选",code:"df[df.a>10]",ex:"筛选条件"},
    {title:"分组统计",code:"df.groupby()",ex:"按班级分组"},
    {title:"数据可视化",code:"plt.plot()",ex:"画折线图"},
    {title:"数据合并",code:"pd.merge()",ex:"合并两个表"},
    {title:"描述统计",code:"df.describe()",ex:"统计信息"},
    {title:"透视表",code:"pd.pivot_table()",ex:"制作透视表"},
    {title:"综合分析",code:"完整数据分析",ex:"完成一份报告"}
  ],
  "数据采集与处理": [
    {title:"文件读取",code:"open()",ex:"读取txt"},
    {title:"CSV读取",code:"pd.read_csv()",ex:"读取csv"},
    {title:"Excel读取",code:"pd.read_excel()",ex:"读取表格"},
    {title:"数据格式转换",code:"astype()",ex:"转数字"},
    {title:"缺失值处理",code:"fillna()",ex:"填充空值"},
    {title:"重复值处理",code:"drop_duplicates()",ex:"去重"},
    {title:"字符串处理",code:"str.split()",ex:"分割文本"},
    {title:"数据筛选",code:"query()",ex:"条件筛选"},
    {title:"数据导出",code:"to_excel()",ex:"导出文件"},
    {title:"采集实战",code:"综合采集",ex:"完成数据集"}
  ],
  "供应链数据分析": [
    {title:"供应链指标",code:"基础指标",ex:"列出指标"},
    {title:"库存分析",code:"库存计算",ex:"计算周转率"},
    {title:"物流成本",code:"成本统计",ex:"统计成本"},
    {title:"需求预测",code:"简单预测",ex:"预测销量"},
    {title:"供应商评估",code:"评分模型",ex:"给供应商打分"},
    {title:"订单分析",code:"订单统计",ex:"统计订单量"},
    {title:"客户分析",code:"RFM模型",ex:"客户分类"},
    {title:"仓储分析",code:"库位分析",ex:"分析使用率"},
    {title:"配送优化",code:"路线优化",ex:"优化路线"},
    {title:"综合报告",code:"完整分析",ex:"写分析报告"}
  ],
  "数据库原理与应用": [
    {title:"数据库基础",code:"SQL简介",ex:"说出SQL用途"},
    {title:"SELECT查询",code:"SELECT * FROM",ex:"查询表"},
    {title:"WHERE条件",code:"WHERE age>18",ex:"条件查询"},
    {title:"排序",code:"ORDER BY",ex:"按成绩排序"},
    {title:"分组统计",code:"GROUP BY",ex:"按班级统计"},
    {title:"多表连接",code:"JOIN",ex:"连接两张表"},
    {title:"子查询",code:"嵌套查询",ex:"写子查询"},
    {title:"增删改",code:"INSERT/UPDATE",ex:"插入数据"},
    {title:"索引与视图",code:"INDEX/VIEW",ex:"创建视图"},
    {title:"综合实训",code:"完整SQL项目",ex:"完成数据库作业"}
  ]
};

const cards = document.getElementById('courseCards');
const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');
const courseList = document.getElementById('courseList');
let currentCourse = '';
let currentChap = 0;

// 卡片
Object.keys(data).forEach(c => {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `<h3>${c}</h3><p>共10个章节 | 代码 + 练习</p>`;
  div.onclick = () => openCourse(c);
  cards.appendChild(div);
})

function openCourse(c){
  currentCourse = c; currentChap=0;
  sidebar.style.display='block';
  content.innerHTML = '';
  renderCourseList();
  renderChapter();
}

function renderCourseList(){
  courseList.innerHTML = '';
  Object.keys(data).forEach(c => {
    const div = document.createElement('div');
    div.className = 'course ' + (c==currentCourse ? 'active' : '');
    div.innerText = c;
    div.onclick = () => openCourse(c);
    courseList.appendChild(div);
  })
  const ul = document.createElement('div');
  data[currentCourse].forEach((ch,i) => {
    const d = document.createElement('div');
    d.className = 'chap ' + (i==currentChap ? 'active' : '');
    d.innerText = `第${i+1}章：${ch.title}`;
    d.onclick = () => {currentChap=i;renderChapter()};
    ul.appendChild(d);
  })
  courseList.appendChild(ul);
}

function renderChapter(){
  renderCourseList();
  const ch = data[currentCourse][currentChap];
  content.innerHTML = `
    <div class="title">${currentCourse} - 第${currentChap+1}章：${ch.title}</div>
    <div class="desc">本章学习：${ch.title}</div>
    <div class="code">
      <button class="copy" onclick="copy(this)">复制代码</button>
      <pre>${ch.code}</pre>
    </div>
    <div class="exercise"><h4>📝 练习</h4><p>${ch.ex}</p></div>
  `;
}

function copy(e){
  navigator.clipboard.writeText(e.nextElementSibling.innerText);
  e.innerText = '已复制！';
  setTimeout(()=>e.innerText='复制代码',1500);
}
</script>

</body>
</html>
