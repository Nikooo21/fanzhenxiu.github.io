<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樊珍秀 | 个人课程学习主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #2d3748;
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            text-align: center;
            padding: 60px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 18px;
            opacity: 0.95;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            font-size: 26px;
            color: #1e3a8a;
            margin-bottom: 40px;
            position: relative;
        }

        .section-title::after {
            content: '';
            width: 60px;
            height: 3px;
            background: #3b82f6;
            display: block;
            margin: 12px auto;
            border-radius: 2px;
        }

        .courses {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .course-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(17,24,39,0.06);
            transition: all 0.3s ease;
            text-decoration: none;
            color: #2d3748;
        }

        .course-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(59, 130, 246, 0.15);
        }

        .course-card h3 {
            font-size: 20px;
            color: #1e3a8a;
            margin-bottom: 12px;
        }

        .course-card p {
            font-size: 15px;
            color: #64748b;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>樊珍秀</h1>
        <p>广东科学技术职业学院 | 商学院 | 商务数据分析与应用专业</p>
    </div>

    <div class="container">
        <h2 class="section-title">个人课程学习主页</h2>
        <div class="courses">
            <a class="course-card" href="python-ch1.html">
                <h3>Python基础</h3>
                <p>共10个章节 | 示例代码 + 课后练习</p>
            </a>
            <a class="course-card" href="analysis-ch1.html">
                <h3>数据分析技术</h3>
                <p>共10个章节 | 示例代码 + 课后练习</p>
            </a>
            <a class="course-card" href="collect-ch1.html">
                <h3>数据采集与处理</h3>
                <p>共10个章节 | 示例代码 + 课后练习</p>
            </a>
            <a class="course-card" href="supply-ch1.html">
                <h3>供应链数据分析</h3>
                <p>共10个章节 | 示例代码 + 课后练习</p>
            </a>
            <a class="course-card" href="database-ch1.html">
                <h3>数据库原理与应用</h3>
                <p>共10个章节 | 示例代码 + 课后练习</p>
            </a>
        </div>
    </div>

    <div class="footer">
        © 2026 樊珍秀 | 商务数据分析与应用专业学习平台
    </div>
</body>
</html>
