<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樊珍秀 | 商务数据分析与应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #2d3748;
            line-height: 1.6;
        }

        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            text-align: center;
            padding: 60px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 18px;
            opacity: 0.95;
        }

        /* 内容容器 */
        .container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            font-size: 26px;
            color: #1e3a8a;
            margin-bottom: 40px;
            position: relative;
        }

        .section-title::after {
            content: '';
            width: 60px;
            height: 3px;
            background: #3b82f6;
            display: block;
            margin: 12px auto;
            border-radius: 2px;
        }

        /* 课程卡片网格 */
        .courses {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* 课程卡片 */
        .course-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(17,24,39,0.06);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: #2d3748;
        }

        .course-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(59, 130, 246, 0.15);
        }

        .course-card h3 {
            font-size: 20px;
            color: #1e3a8a;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .course-card p {
            font-size: 15px;
            color: #64748b;
        }

        /* 底部 */
        .footer {
            text-align: center;
            padding: 30px;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- 头部信息 -->
    <div class="header">
        <h1>樊珍秀</h1>
        <p>广东科学技术职业学院 | 商学院 | 商务数据分析与应用专业</p>
    </div>

    <!-- 课程内容区 -->
    <div class="container">
        <h2 class="section-title">我的专业课程</h2>
        <div class="courses">
            
            <a class="course-card" href="./python-base.html">
                <h3>Python基础</h3>
                <p>编程基础、语法结构、数据类型、函数与文件操作</p>
            </a>

            <a class="course-card" href="./data-analysis.html">
                <h3>数据分析技术</h3>
                <p>Pandas、NumPy、Matplotlib数据处理与可视化</p>
            </a>

            <a class="course-card" href="./data-collection.html">
                <h3>数据采集与处理</h3>
                <p>网络爬虫、数据清洗、数据标准化、异常值处理</p>
            </a>

            <a class="course-card" href="./supply-chain.html">
                <h3>供应链数据分析</h3>
                <p>供应链数据建模、库存分析、需求预测、商业决策</p>
            </a>

            <a class="course-card" href="./database.html">
                <h3>数据库原理与应用</h3>
                <p>SQL语言、数据库设计、MySQL实操、数据查询优化</p>
            </a>

        </div>
    </div>

    <!-- 底部 -->
    <div class="footer">
        © 2025 樊珍秀 | 商务数据分析与应用专业学习主页
    </div>

</body>
</html>
